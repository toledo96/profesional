spring.application.name=store

server.port=8080
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3307/store?useSSL=false
spring.datasource.username=root
spring.datasource.password=mysql
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.redis.host=localhost
spring.redis.port=6379
# Tiempo de espera de conexión
spring.redis.timeout=60000

# Si usas base de datos distinta a la 0
spring.redis.database=1


# Cambiar la ruta base de Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html

# Cambiar la ruta del documento OpenAPI (JSON/YAML)
springdoc.api-docs.path=/api-docs


# Habilitar/deshabilitar Swagger UI
springdoc.swagger-ui.enabled=true



